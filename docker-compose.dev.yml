
services:
  db:
    image: postgres:15-alpine
    container_name: ecolearn_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecolearn
      POSTGRES_USER: ecolearn
      POSTGRES_PASSWORD: ecolearn2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecolearn"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecolearn_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ecolearn_backend
    restart: unless-stopped
    secrets:
      - openai_api_key
    environment:
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://openrouter.ai/api/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-openai/gpt-4o-mini}
      OPENAI_API_KEY_FILE: /run/secrets/openai_api_key
      DATABASE_URL: postgresql://ecolearn:ecolearn2024@db:5432/ecolearn
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      TREE_API_URL: ${TREE_API_URL:-https://api.tree-nation.com/v1}
      TREE_API_KEY: ${TREE_API_KEY:-}
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - ecolearn_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ecolearn_frontend
    restart: unless-stopped
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
    networks:
      - ecolearn_network

networks:
  ecolearn_network:
    driver: bridge

volumes:
  postgres_data:

secrets:
  openai_api_key:
    file: ./secrets/openai_api_key.txt
