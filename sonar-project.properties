# SonarCloud Configuration for EcoLearn AI

sonar.projectKey=ecolearn-ai
sonar.organization=your-organization

# Project metadata
sonar.projectName=EcoLearn AI
sonar.projectVersion=1.0.0

# Source code paths
sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/__pycache__/**,\
  **/venv/**,\
  **/migrations/**,\
  **/*.test.js,\
  **/*.spec.js

# Test exclusions
sonar.test.exclusions=\
  **/tests/**,\
  **/__tests__/**,\
  **/*.test.js,\
  **/*.spec.js

# Python specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# JavaScript/TypeScript settings
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Code coverage
sonar.coverage.exclusions=\
  **/tests/**,\
  **/__tests__/**,\
  **/migrations/**,\
  **/*.test.js

# Duplication
sonar.cpd.exclusions=\
  **/tests/**,\
  **/__tests__/**

# Quality Gates
sonar.qualitygate.wait=true

# Issue detection
sonar.issue.ignore.multicriteria=e1,e2

# Rule exclusions
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py

sonar.issue.ignore.multicriteria.e2.ruleKey=python:S107
sonar.issue.ignore.multicriteria.e2.resourceKey=**/*.py

# Encoding
sonar.sourceEncoding=UTF-8

# Language distribution
sonar.language=py,js

# Security hotspots
sonar.security.hotspots.inheritance=true

# Branch analysis (for PRs)
sonar.pullrequest.provider=github
sonar.pullrequest.github.repository=your-org/ecolearn-ai
