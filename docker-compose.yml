version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: ecolearn
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecolearn
      POSTGRES_USER: ecolearn
      POSTGRES_PASSWORD: ecolearn2024
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ecolearn"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecolearn_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecolearn_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://ecolearn:ecolearn2024@db:5432/ecolearn
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      TREE_API_URL: ${TREE_API_URL:-https://api.tree-nation.com/v1}
      TREE_API_KEY: ${TREE_API_KEY:-}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - ecolearn_network

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecolearn_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - ecolearn_network
      
networks:
  ecolearn_network:
    driver: bridge

volumes:
  postgres_data:
