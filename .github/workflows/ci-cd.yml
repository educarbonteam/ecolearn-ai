name: EcoLearn AI CI/CD

on:
  push:
    branches:
      - feature/aws-deploy
      - main
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "18"

  # --- AWS (préparation) ---
  AWS_REGION: eu-west-1
  ECR_REPOSITORY_BACKEND: ecolearn-backend
  ECR_REPOSITORY_FRONTEND: ecolearn-frontend
  ECS_CLUSTER: ecolearn-cluster
  ECS_SERVICE: ecolearn-service
  ECS_TASK_DEFINITION: .aws/task-definition.json

jobs:
  backend:
    name: Backend • Lint + Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps (backend)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Black (check)
        run: |
          cd backend
          black --check .

      - name: Flake8
        run: |
          cd backend
          flake8 .

      - name: MyPy
        run: |
          cd backend
          mypy . --ignore-missing-imports

      - name: Pytest
        env:
          # IMPORTANT: requis pour éviter RuntimeError à l'import (core/config.py)
          OPENAI_API_KEY: "dummy-ci-key"
          SECRET_KEY: "dummy-ci-secret"
        run: |
          cd backend
          pytest -v --cov=. --cov-report=xml

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  frontend:
    name: Frontend • Lint + Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps (frontend)
        run: |
          cd frontend
          npm ci

      - name: Lint (frontend)
        run: |
          cd frontend
          npm run lint

      - name: Tests (vitest)
        run: |
          cd frontend
          npx vitest run --passWithNoTests

      - name: Build (frontend)
        run: |
          cd frontend
          npm run build

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  docker-build:
    name: Docker • Build images
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: ecolearn-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: ecolearn-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-ecs:
    name: Deploy • AWS ECS (ECR + ECS)
    runs-on: ubuntu-latest
    needs: [docker-build]

    # ✅ Déploie sur main ET sur ta branche feature/aws-deploy
    if: github.ref == 'refs/heads/axs' || github.ref == 'refs/heads/feature/aws-deploy'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Pré-check secrets : si pas de secrets -> on "skip" toutes les étapes AWS sans casser le job
      - name: Check AWS secrets are present
        id: precheck
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || \
             [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] || \
             [ -z "${{ secrets.AWS_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "AWS secrets missing. Skipping deploy steps."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.precheck.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.precheck.outputs.skip != 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push backend to ECR
        if: steps.precheck.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend to ECR
        if: steps.precheck.outputs.skip != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Render task definition (backend image)
        if: steps.precheck.outputs.skip != 'true'
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: backend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}

      - name: Render task definition (frontend image)
        if: steps.precheck.outputs.skip != 'true'
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          container-name: frontend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}

      - name: Deploy to ECS service
        if: steps.precheck.outputs.skip != 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
