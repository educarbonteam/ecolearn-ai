name: EcoLearn AI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ecolearn-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # utile si tu passes en OIDC AWS
  pull-requests: read

env:
  AWS_REGION: eu-west-1
  ECR_REPOSITORY_BACKEND: ecolearn-backend
  ECR_REPOSITORY_FRONTEND: ecolearn-frontend
  ECS_SERVICE: ecolearn-service
  ECS_CLUSTER: ecolearn-cluster
  ECS_TASK_FAMILY: ecolearn-task  # nom task definition ECS
  # Si tu utilises une task definition dans le repo :
  ECS_TASK_DEFINITION_FILE: .aws/task-definition.json

jobs:
  # ==================== STAGE 1: TEST (backend + frontend) ====================
  test:
    name: Tests (Backend + Frontend)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ecolearn_test
          POSTGRES_USER: ecolearn
          POSTGRES_PASSWORD: ecolearn2024
        options: >-
          --health-cmd "pg_isready -U ecolearn -d ecolearn_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Backend ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://ecolearn:ecolearn2024@localhost:5432/ecolearn_test
          SECRET_KEY: test-secret-key
        run: |
          cd backend
          pytest -v --cov=. --cov-report=xml --cov-report=html

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/coverage.xml
            backend/htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-coverage
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      # ---------- Frontend ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --coverage

      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 14

  # ==================== STAGE 2: ANALYZE ====================
  analyze:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install analysis tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install flake8 black mypy bandit

      - name: Flake8 (backend)
        run: |
          cd backend
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Black check (backend)
        run: |
          cd backend
          black --check .

      - name: MyPy (backend)
        run: |
          cd backend
          mypy . --ignore-missing-imports

      - name: Bandit (backend)
        run: |
          cd backend
          bandit -r . -f json -o bandit-report.json

      - name: Set up Node.js (for Sonar / JS analysis)
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Download coverage artifacts (for Sonar)
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: backend

      - name: Download frontend coverage artifact (for Sonar)
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=ecolearn-ai
            -Dsonar.organization=your-org
            -Dsonar.sources=backend,frontend/src
            -Dsonar.tests=backend/tests
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

      - name: Upload security report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: backend/bandit-report.json
          retention-days: 30

  # ==================== STAGE 3: DEPLOY ====================
  deploy:
    name: Deploy to AWS ECS
    runs-on: ubuntu-latest
    needs: [test, analyze]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Option A (RECOMMANDÉ): OIDC (Role AWS)
      # => crée un IAM Role avec trust GitHub OIDC + permissions ECR/ECS/Logs
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      # Option B (si tu refuses OIDC): clés statiques
      # - name: Configure AWS credentials (Static Keys)
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG backend
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_BACKEND:latest

      - name: Build & push Frontend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG frontend
          docker tag  $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_FRONTEND:latest

      # Mieux: utiliser la task definition du repo (versionnée).
      - name: Render task definition (backend image)
        id: task-def-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION_FILE }}
          container-name: backend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_BACKEND }}:${{ github.sha }}

      - name: Render task definition (frontend image)
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-backend.outputs.task-definition }}
          container-name: frontend
          image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY_FRONTEND }}:${{ github.sha }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def-frontend.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment
        run: |
          aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].deployments' \
            --output table

  # ==================== MONITORING (OPTIONNEL) ====================
  setup-monitoring:
    name: Configure CloudWatch Monitoring
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CloudWatch Log Groups
        run: |
          aws logs create-log-group --log-group-name /ecs/ecolearn-backend || true
          aws logs create-log-group --log-group-name /ecs/ecolearn-frontend || true
          aws logs put-retention-policy --log-group-name /ecs/ecolearn-backend --retention-in-days 30
          aws logs put-retention-policy --log-group-name /ecs/ecolearn-frontend --retention-in-days 30

      - name: Create CloudWatch Alarms
        run: |
          aws cloudwatch put-metric-alarm \
            --alarm-name ecolearn-high-cpu \
            --alarm-description "Alert when CPU exceeds 80%" \
            --metric-name CPUUtilization \
            --namespace AWS/ECS \
            --statistic Average \
            --period 300 \
            --evaluation-periods 2 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --dimensions Name=ServiceName,Value=$ECS_SERVICE Name=ClusterName,Value=$ECS_CLUSTER

          aws cloudwatch put-metric-alarm \
            --alarm-name ecolearn-high-memory \
            --alarm-description "Alert when memory exceeds 80%" \
            --metric-name MemoryUtilization \
            --namespace AWS/ECS \
            --statistic Average \
            --period 300 \
            --evaluation-periods 2 \
            --threshold 80 \
            --comparison-operator GreaterThanThreshold \
            --dimensions Name=ServiceName,Value=$ECS_SERVICE Name=ClusterName,Value=$ECS_CLUSTER
